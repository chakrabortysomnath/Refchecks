# Render Blueprint for the RefChecks frontend (React + Vite static site).
#
# The backend web service + PostgreSQL are managed separately (created before
# this Blueprint existed) and are intentionally NOT redefined here, so syncing
# this Blueprint will only create/update the static site.
#
# After the first deploy:
#   1. Set VITE_API_URL and VITE_GOOGLE_CLIENT_ID in the static site's
#      Environment settings (they are `sync: false` below, so Render will
#      prompt for their values and NOT store them in git).
#   2. Add the resulting *.onrender.com URL to the backend's CORS_ORIGINS.
#   3. Add the same URL to Google Cloud Console (Authorized JavaScript origins).
#
# NOTE: Vite inlines VITE_* vars at build time. After changing either env var,
# trigger a manual redeploy so the new value is baked into the bundle.

services:
  - type: web
    runtime: static
    name: refchecks-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
    routes:
      # SPA fallback: serve index.html for client-side routes.
      - type: rewrite
        source: /*
        destination: /index.html
